version: '3.8'

services:
  api:
    build:
      context: .
    image: taxmind-api:latest
    container_name: taxmind-api
    ports:
      - '5000:5000'
    depends_on:
      - redis
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: redis-service
    ports:
      - '6379:6379'
    networks:
      - app-network
    volumes:
      - redis-data:/data

networks:
  app-network:
    driver: bridge

volumes:
  redis-data:
