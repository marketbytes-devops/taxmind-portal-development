    put:
      tags:
        - Tax Credits Management
      summary: Update Tax Credit
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                name: Dependent Relative Tax Credit
                description: >-
                  Receive €245 per dependent annually for supporting a dependent
                  relative
                details: >-
                  The Dependent Relative Tax Credit is a tax credit available in
                  Ireland to individuals who maintain a dependent relative. This
                  credit is designed to provide financial relief to those who
                  support a dependent family memberWho Qualifies as a Dependent
                  Relative?A dependent relative includes:A relative, or a
                  relative of your spouse or civil partner, who is incapacitated
                  by old age or illness.A widowed parent, or a parent who is a
                  surviving civil partner, regardless of their income level.A
                  child of the claimant, or of the claimant’s spouse or civil
                  partner, who is permanently incapacitated due to physical or
                  mental disability.Amount of the Tax CreditThe Dependent
                  Relative Tax Credit for 2024 is €245 and 2025 €305This amount
                  is non-refundable, meaning it can only be used to reduce your
                  tax liability and cannot be claimed as a cash refund.Claim it
